<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Strategy Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf9f5;--panel:#fffdf7;--panel2:#f5f0e8;--border:#e6dfd8;--txt:#141413;--dim:#6c6a64;
--primary:#cc785c;--green:#2f9e5b;--red:#c64545;--chip:#efe9de;
--serif:"Cormorant Garamond",Georgia,"Songti SC","SimSun",serif;--sans:"Inter","Microsoft YaHei",system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:#3d3d3a;font-family:var(--sans);padding:20px;line-height:1.5}
h1{font-family:var(--serif);font-size:28px;font-weight:600;color:var(--txt)}
.sub{color:var(--dim);font-size:12px;margin:4px 0 14px}
.counts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.count{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600}
.sec{font-family:var(--serif);font-size:20px;font-weight:600;margin:22px 0 10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:15px;box-shadow:0 1px 2px rgba(20,20,19,.04)}
.top{display:flex;justify-content:space-between;align-items:flex-start}
.sym{font-size:17px;font-weight:800}
.nm{color:var(--dim);font-size:11px}
.p{font-size:17px;font-weight:700;text-align:right}
.up{color:var(--green)}.down{color:var(--red)}
.chip{display:inline-block;font-size:10px;font-weight:700;padding:1px 8px;border-radius:7px;margin-top:5px}
.c-brk{background:#e9f5ee;color:#217a44}.c-dip{background:#f9ede8;color:var(--primary)}.c-avoid{background:#faeceb;color:var(--red)}.c-hold{background:#eaf3f0;color:#2f7d6b}
.rows{margin-top:10px;font-size:12px}
.row{display:flex;justify-content:space-between;padding:2px 0}
.row .k{color:var(--dim)}
.sig{margin-top:10px;background:var(--panel2);border-radius:8px;padding:9px 11px;font-size:12px}
.sig .t{font-weight:700;margin-bottom:3px}
.bt{margin-top:9px;font-size:11px;color:var(--dim)}
.act{margin-top:9px;font-size:11.5px;color:var(--txt);border-left:3px solid var(--primary);padding-left:8px}
footer{margin-top:26px;background:#181715;color:#a09d96;border-radius:12px;padding:20px;font-size:11px;line-height:1.7}
footer b{color:#e8e0d2}
</style></head><body>
<h1>📊 <span id="ttl"></span></h1>
<div class="sub" id="sub"></div>
<div class="counts" id="counts"></div>
<div id="body"></div>
<footer id="foot"></footer>
<script>
const PAYLOAD=/*__DATA__*/{};
const SLAB={brk:['📈 宜突破','c-brk'],brk_atr:['📈 突破·宽止损','c-brk'],hold:['🏔️ 长持','c-hold'],dip:['📉 宜抄底','c-dip'],dip_re:['📉 抄底+再进','c-dip'],avoid:['🚫 回避','c-avoid']};
const STL={para:['🔥抛物线','#faeceb','#c64545'],hot:['🔥过热','#faeceb','#c64545'],brk:['⚠️破位','#f8f1df','#b07d0a'],tight:['🛡️紧平台','#e9f5ee','#217a44'],quiet:['😴安静','#efe9de','#6c6a64'],neutral:['·常态','#efe9de','#6c6a64']};
function stChip(r){var s=r.state;if(!s||!STL[s.st])return '';var x=STL[s.st];return ' <span class="chip" style="background:'+x[1]+';color:'+x[2]+'">'+x[0]+'</span>'}
function distChip(r){var s=r.signal||{};
 // Breakout FIRST: pre-trigger the price sits below the ATR stop by design (you haven't
 // entered yet), so the stop-breach test must NOT run here — it only applies to a dip
 // whose support has failed. Ordering these wrong flags every un-triggered breakout as broken.
 if(s.type==='breakout'&&s.trigger){var d=(s.trigger-r.last)/r.last*100;
  if(d<=0)return ' <span class="chip" style="background:#e9f5ee;color:#217a44;font-weight:800">🚀已过触发价</span>';
  if(d<=3)return ' <span class="chip" style="background:#e9f5ee;color:#217a44">🟢距触发+'+d.toFixed(1)+'%</span>';
  return ' <span class="chip" style="background:#efe9de;color:#6c6a64">距触发+'+d.toFixed(1)+'%·勿追</span>';}
 var z=s.buy_zones&&s.buy_zones[0];if(!z)return '';
 var st=s.stop||s.trend_stop;
 if(st&&r.last<=st)return ' <span class="chip" style="background:#faeceb;color:#c64545">⛔破位·信号失效</span>';
 var d2=(r.last-z)/z*100;
 if(d2<=1)return ' <span class="chip" style="background:#e9f5ee;color:#217a44;font-weight:800">🎯已到买点</span>';
 if(d2<=6)return ' <span class="chip" style="background:#e9f5ee;color:#217a44">🟢近买点+'+d2.toFixed(1)+'%</span>';
 return ' <span class="chip" style="background:#efe9de;color:#6c6a64">离买点+'+d2.toFixed(1)+'%</span>';}
function stAdv(r){var s=r.state;var t=s?({para:'🔥抛物线(20日+'+s.ret20+'%、超50MA '+s.ext+'%):10日暴涨/暴跌概率均×2.3——持有者减仓+收紧止损、勿加仓;买入计划暂停',hot:'🔥短期过热(5日+'+s.ret5+'%):10日暴跌概率×2.2——别追高,等回踩;持有者可先兑现一部分',brk:'⚠️破位(50MA下、20日'+s.ret20+'%):跌势延续概率×1.38——买入暂停、不接飞刀;持有者反抽即减',tight:'🛡️紧平台近高(20日区间'+s.rng20+'%):10日暴跌概率≈0——埋伏安全,分批建仓等突破',quiet:'😴低波动安静:大概率延续,按计划执行'}[s.st]||''):'';
 var g=r.gap;
 if(g&&g.cont!=null&&Math.abs(r.chg)>=2){var gt=r.chg>=2?(g.cont<=45?'🔴 今日大涨+'+r.chg+'%别追:该票≥2%跳空延续率仅'+g.cont+'%(n='+g.n_up+')、追入开→收均值'+g.oc_up+'%,fade票的高开=减仓窗口':g.cont>=55?'🟢 今日+'+r.chg+'%可顺势:跳空延续率'+g.cont+'%(n='+g.n_up+'),止损设开盘价下方':'🟡 今日+'+r.chg+'%:跳空无明显倾向('+g.cont+'%),按原计划'):(g.bounce!=null&&g.bounce>=55?'🟢 今日'+r.chg+'%:历史下跳反弹率'+g.bounce+'%,企稳后可按买入区接':'🔴 今日'+r.chg+'%:下跳反弹率'+(g.bounce==null?'样本不足':g.bounce+'%')+',不接飞刀');t=(t?t+'<br>':'')+gt;}
 return t?'<div style="margin-top:6px;font-size:11px;color:#3d3d3a;border-top:1px dashed #e6dfd8;padding-top:5px">'+t+'</div>':''}
const $=id=>document.getElementById(id);
$('ttl').textContent=PAYLOAD.title||'Stock Strategy Dashboard';
$('sub').textContent='更新 '+PAYLOAD.as_of+' · 数据源 '+PAYLOAD.source+' · '+PAYLOAD.tickers.length+' 只 · 决策辅助非投资建议';
const money=n=>'$'+(+n).toLocaleString(undefined,{maximumFractionDigits:2});
function bt(r){if(r.strategy==='hold'&&r.hold_stats){var h=r.hold_stats;return '买持: 全程+'+h.buy_hold_pct+'% · CAGR '+h.cagr+'% · 最大回撤'+h.max_dd+'%';}var b=r.backtest||{};var s=r.strategy;var x=(s==='brk'?b.brk:s==='brk_atr'?b.brk_atr:s==='dip_re'?b.dip_re:b.dip)||{};if(!x.n)return '';return '回测: '+x.n+'笔 · 胜'+x.win_rate+'% · 期望'+x.expectancy_R+'R';}
function posSize(entry,stop){var cap=PAYLOAD.capital||0,rp=PAYLOAD.risk_pct||1.5;if(!cap||!entry||!stop||stop>=entry)return '';var risk=cap*rp/100;var sh=Math.floor(risk/(entry-stop));if(sh<1)return '';var cost=Math.round(sh*entry);if(cost>cap*0.35){sh=Math.floor(cap*0.35/entry);cost=Math.round(sh*entry);}return '<div style="margin-top:5px;font-size:11px;color:#2f7d6b;font-weight:600">💰 建议仓位 '+sh+'股≈$'+cost.toLocaleString()+' · 单笔风险$'+Math.round(risk)+'('+rp+'%)</div>';}
function sigHtml(r){var s=r.signal;if(!s||!s.type)return '';
 if(s.type==='breakout')return '<div class="sig"><div class="t" style="color:#217a44">📈 突破买入</div>突破 &gt; '+money(s.trigger)+' · 止损 '+money(s.stop)+'<br><span style="color:var(--dim)">'+s.status+'</span>'+posSize(s.trigger,s.stop)+'</div>';
 if(s.type==='hold')return '<div class="sig"><div class="t" style="color:#2f7d6b">🏔️ 长持·买便宜(正股·不加杠杆)</div>回踩买入 '+s.buy_zones.map(money).join(' / ')+'<br>目标 '+s.target.map(money).join(' / ')+' · 破 '+money(s.trend_stop)+'(200日线)离场'+posSize(s.buy_zones[0],s.trend_stop)+'</div>';
 return '<div class="sig"><div class="t" style="color:var(--primary)">📉 分批买入区</div>'+s.buy_zones.map(money).join(' / ')+' · 止损 '+money(s.stop)+'<br><span style="color:var(--dim)">'+(s.note||'')+'</span>'+posSize(s.buy_zones[0],s.stop)+'</div>';}
function card(r){var sl=SLAB[r.strategy]||SLAB.avoid;var cc=r.chg>=0?'up':'down';
 return '<div class="card" data-sym="'+r.ticker+'"><div class="top"><div><div class="sym">'+r.ticker+'</div><div class="nm">'+r.stage+' · 波动'+r.vol+'%</div><div><span class="chip '+sl[1]+'">'+sl[0]+'</span>'+stChip(r)+distChip(r)+'</div></div>'+
 '<div><div class="p">'+money(r.last)+'</div><div class="'+cc+'" style="font-size:12px;font-weight:600;text-align:right">'+(r.chg>=0?'▲':'▼')+' '+r.chg+'%</div></div></div>'+
 '<div class="rows"><div class="row"><span class="k">距52周高</span><span class="down">'+r.pct_from_high+'%</span></div>'+(r.bucket?'<div class="row"><span class="k">类别</span><span>'+r.bucket+'</span></div>':'')+'</div>'+
 sigHtml(r)+stAdv(r)+(bt(r)?'<div class="bt">'+bt(r)+'</div>':'')+(r.action?'<div class="act">'+r.action+'</div>':'')+'</div>';}
const order=['brk','brk_atr','dip','dip_re','hold','avoid'];const secName={brk:'📈 宜突破',brk_atr:'📈 突破·宽止损',hold:'🏔️ 长持(正股)',dip:'📉 宜抄底',dip_re:'📉 抄底+再进',avoid:'🚫 回避'};
const byS={};PAYLOAD.tickers.forEach(r=>{(byS[r.strategy]=byS[r.strategy]||[]).push(r)});
$('counts').innerHTML=order.filter(s=>byS[s]).map(s=>'<div class="count">'+secName[s]+' '+byS[s].length+'</div>').join('');
(function(){var mk=PAYLOAD.market;if(mk){$('counts').insertAdjacentHTML('beforebegin','<div style="padding:9px 14px;border-radius:10px;margin-bottom:10px;font-weight:700;font-size:13px;background:'+(mk.above?'#e9f5ee;color:#217a44':'#faeceb;color:#c64545')+'">'+(mk.above?'🟢 大盘开关:SPY $'+mk.spy+' 在200日线上(+'+mk.pct+'%)——允许追涨/正常仓位':'🔴 大盘开关:SPY $'+mk.spy+' 破200日线('+mk.pct+'%)——禁突破追涨·仓位减半')+'</div>');}
 var cl=PAYLOAD.clusters;if(cl&&cl.length){$('counts').insertAdjacentHTML('afterend','<div style="font-size:11px;color:#6c6a64;margin-bottom:8px">⚠️ 相关簇(120日corr&gt;0.7,同簇≈同一注,每簇限1-2仓):'+cl.map(c=>'['+c.join(' ')+']').join(' · ')+'</div>');}})();
$('body').innerHTML=order.filter(s=>byS[s]).map(s=>'<div class="sec">'+secName[s]+'</div><div class="grid">'+byS[s].map(card).join('')+'</div>').join('');
/* quick filters + search (own row, sticky) */
(function(){
 var bar=document.createElement('div');
 bar.style.cssText='position:sticky;top:0;background:var(--bg,#faf9f5);z-index:9;padding:8px 0;border-bottom:1px solid #e6dfd8;display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px';
 bar.innerHTML='<input id="qsearch" placeholder="搜索代码…" style="background:#fffdf7;border:1px solid #e6dfd8;padding:6px 12px;border-radius:8px;font-size:12px;width:130px">'
  +'<span style="flex-basis:100%;height:0"></span>'
  +'<span style="font-size:11px;color:#6c6a64;font-weight:600">一键筛选:</span>'
  +'<button class="qbtn" data-q="near" style="background:#e9f5ee;border:1px solid rgba(33,122,68,.35);color:#217a44;font-size:12px;font-weight:700;padding:6px 12px;border-radius:8px;cursor:pointer">🟢 接近买点</button>'
  +'<button class="qbtn" data-q="at" style="background:#e9f5ee;border:1px solid rgba(33,122,68,.35);color:#217a44;font-size:12px;font-weight:700;padding:6px 12px;border-radius:8px;cursor:pointer">🎯 达到买点</button>'
  +(PAYLOAD.top10?'<button class="qbtn" data-q="cheap" style="background:#e9f5ee;border:1px solid rgba(33,122,68,.35);color:#217a44;font-size:12px;font-weight:700;padding:6px 12px;border-radius:8px;cursor:pointer">💎 Top10期权票</button>':'');
 document.getElementById('body').insertAdjacentElement('beforebegin',bar);
 var byT={};PAYLOAD.tickers.forEach(r=>byT[r.ticker]=r);
 function dist(r){var s=r.signal||{};
  if(s.type==='breakout')return (s.trigger-r.last)/r.last*100;
  var z=(s.buy_zones&&s.buy_zones[0]);return z?(r.last-z)/z*100:null;}
 function match(t,m){var r=byT[t];if(!r)return false;
  if(m==='cheap')return (PAYLOAD.top10||[]).some(x=>x.t===t);
  var d=dist(r);if(d===null)return false;
  return m==='at'?d<=1:(d>1&&d<=6);}
 function apply(m,q){document.querySelectorAll('#body .card').forEach(c=>{
   var ok=(!q||c.dataset.sym.includes(q))&&(!m||match(c.dataset.sym,m));c.style.display=ok?'':'none';});
  document.querySelectorAll('#body .sec').forEach(sec=>{var g=sec.nextElementSibling;
   if(!g||!g.classList||!g.classList.contains('grid'))return;
   var any=[...g.children].some(c=>c.style.display!=='none');
   sec.style.display=any?'':'none';g.style.display=any?'':'none';});}
 var mode=null;
 bar.addEventListener('click',e=>{var b=e.target.closest('.qbtn');if(!b)return;
  var was=b.style.background==='rgb(33, 122, 68)';
  bar.querySelectorAll('.qbtn').forEach(x=>{x.style.background='#e9f5ee';x.style.color='#217a44';});
  mode=was?null:b.dataset.q;
  if(!was){b.style.background='#217a44';b.style.color='#fff';}
  apply(mode,document.getElementById('qsearch').value.toUpperCase().trim());});
 document.getElementById('qsearch').addEventListener('input',e=>apply(mode,e.target.value.toUpperCase().trim()));
})();
/* market-wide movers radar (zero-cost local scan) */
(function(){var M=PAYLOAD.movers;if(!M)return;var watch=new Set(PAYLOAD.tickers.map(r=>r.ticker));
 function tbl(rows,title){if(!Array.isArray(rows)||!rows.length)return '';
  var tr=rows.map(r=>'<tr'+(r.volx>=3?' style="background:#f9ede8"':'')+'><td><b>'+r.s+'</b>'+(watch.has(r.s)?' <span style="font-size:9px;color:var(--primary)">自选</span>':'')+'</td><td style="text-align:left;font-size:10.5px;color:#6c6a64">'+r.n+'</td><td>$'+r.px+'</td><td class="'+(r.chg>=0?'up':'down')+'">'+(r.chg>=0?'+':'')+r.chg+'%</td><td>'+(r.volx==null?'—':r.volx+'x')+'</td></tr>').join('');
  return '<div class="sec">'+title+'</div><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="color:#6c6a64"><th>票</th><th style="text-align:left">名称</th><th>价</th><th>涨跌</th><th>量比</th></tr></thead><tbody>'+tr+'</tbody></table>';}
 var uoa='';
 if(M.uoa&&M.uoa.length){uoa='<div class="sec">🐋 期权异动 UOA(成交≥3×OI)</div><table style="width:100%;border-collapse:collapse;font-size:12px"><tbody>'+M.uoa.map(u=>'<tr><td><b>'+u.t+'</b></td><td>'+(u.kind==='C'?'📈C':'📉P')+'</td><td>'+u.expiry+'</td><td>$'+u.k+'</td><td>'+u.vol.toLocaleString()+'/'+u.oi.toLocaleString()+'='+u.ratio+'x</td><td>$'+u.prem_m+'M</td></tr>').join('')+'</tbody></table><div style="font-size:11px;color:#6c6a64;margin-top:6px">UOA分不出买卖方向(需逐笔数据),近到期大单可能是做市对冲——参考方向,勿直接抄单。</div>';}
 document.getElementById('body').insertAdjacentHTML('beforeend','<div class="sec" style="margin-top:26px">📡 全市场异动雷达('+M.as_of+' · 延迟~15分钟 · 高亮=量比≥3)</div>'+tbl(M.movers.day_gainers,'📈 涨幅榜')+tbl(M.movers.day_losers,'📉 跌幅榜')+tbl(M.movers.most_actives,'🔥 成交活跃')+uoa);})();
/* earnings radar + daily top-10 options */
(function(){var E=PAYLOAD.earnings;var T=PAYLOAD.top10;var out='';
 if(E&&E.length){out+='<div class="sec" style="margin-top:20px">📅 财报雷达(未来3周)</div><table style="width:100%;border-collapse:collapse;font-size:12px"><tbody>'+E.map(e=>{var w=e.days<=1?'<b style="color:#c64545">公告在即:穿越=负期望(-5~-14%),今天决定去留</b>':e.days<=4?'<b style="color:#cc785c">跨式窗口:前3天买、公告前平(历史+3.3%)</b>':'窗口未到:D-3再看,届时比 implied vs 历史move';return '<tr'+(e.days<=4?' style="background:#f9ede8"':'')+'><td>'+e.date+'</td><td><b>'+e.t+'</b></td><td>'+e.days+'天</td><td style="text-align:left;font-size:11px">'+w+'</td></tr>'}).join('')+'</tbody></table>';}
 if(T&&T.length){out+='<div class="sec" style="margin-top:20px">📡 每日Top10期权(真实报价·去趋势EV·即使全贵也排最不差)</div><table style="width:100%;border-collapse:collapse;font-size:12px"><tbody>'+T.map((r,i)=>'<tr'+(i<3?' style="background:#f9ede8"':'')+'><td><b>#'+(i+1)+'</b></td><td><b>'+r.t+'</b></td><td>'+r.bucket+'</td><td>'+r.expiry+'</td><td>K '+r.K+'</td><td>$'+r.mid+'</td><td class="'+(r.EV_pct>=0?'up':'down')+'" style="font-weight:700">'+r.EV_pct+'%</td><td>'+r.P_win+'%</td><td style="font-size:10px">'+(r.gates&&r.gates.length?'⛔'+r.gates[0]:'✅')+'</td></tr>').join('')+'</tbody></table><div style="font-size:11px;color:#6c6a64;margin-top:5px">EV为正≠稳赚(胜率25-35%是尾部赔率);带⛔的按门控执行(价差替代/不买)。</div>';}
 if(out)document.getElementById('body').insertAdjacentHTML('beforeend',out);})();
/* dark-pool SVR radar (FINRA free) */
(function(){var D=PAYLOAD.dark;if(!D||!D.rows||!D.rows.length)return;
 var tr=D.rows.map(r=>'<tr'+(Math.abs(r.z)>=1.5?' style="background:#f9ede8"':'')+'><td><b>'+r.t+'</b></td><td>'+r.svr+'%</td><td>'+r.avg10+'%</td><td class="'+(r.z>0?'up':'down')+'" style="font-weight:700">'+r.z+'</td><td>'+(r.z>=1.5?'🟢买压跳升':r.z<=-1.5?'🔴买压萎缩':'·')+'</td></tr>').join('');
 document.getElementById('body').insertAdjacentHTML('beforeend','<div class="sec" style="margin-top:20px">🌑 暗盘雷达(FINRA官方免费 · '+D.as_of+')</div><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="color:#6c6a64"><th>票</th><th>SVR</th><th>10日均</th><th>z分</th><th>解读</th></tr></thead><tbody>'+tr+'</tbody></table><div style="font-size:11px;color:#6c6a64;margin-top:6px">DIX逻辑(反直觉):高SVR≈做市商做空填买单=买压;看z分跳变非绝对值。T+1晚间更新,仅统计无逐笔。</div>');})();
/* real-time US market session label (ET), self-refreshing every 60s — a static
   "closed" flag printed at build time goes stale the moment the market opens */
(function(){function paint(){var e=new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));var day=e.getDay(),m=e.getHours()*60+e.getMinutes();var s,c;
 if(day===0||day===6){s='🌙 周末休市';c='#6c6a64'}
 else if(m>=570&&m<960){s='🟢 盘中';c='#217a44'}
 else if(m>=240&&m<570){s='🌅 盘前';c='#b07d0a'}
 else if(m>=960&&m<1200){s='🌆 盘后';c='#b07d0a'}
 else{s='🌙 已收盘';c='#6c6a64'}
 var el=document.getElementById('mktst');if(!el){el=document.createElement('span');el.id='mktst';$('sub').appendChild(el)}
 el.innerHTML=' · <b style="color:'+c+'">'+s+'</b>(美东实时)';}
 try{paint();setInterval(paint,60000)}catch(e){}})();
$('foot').innerHTML='<b>方法:</b> 每只票诊断趋势阶段/波动率,回测"回踩抄底"与"突破追涨"两策略,分配历史正期望者(否则回避并给类别对策);出场跟随SMA50让赢家跑。<br><b>诚实:</b> 规则代理非严格缠论,样本内、历史不代表未来,价值在验证期望与纪律。非投资建议。';
</script></body></html>
