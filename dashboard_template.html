<title>Stock Strategy Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf9f5;--panel:#fffdf7;--panel2:#f5f0e8;--border:#e6dfd8;--txt:#141413;--dim:#6c6a64;

--serif:"Cormorant Garamond",Georgia,"Songti SC","SimSun",serif;--sans:"Inter","Microsoft YaHei",system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:#3d3d3a;font-family:var(--sans);padding:20px;line-height:1.5}
h1{font-family:var(--serif);font-size:28px;font-weight:600;color:var(--txt)}
.sub{color:var(--dim);font-size:12px;margin:4px 0 14px}
.counts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.count{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600}
.sec{font-family:var(--serif);font-size:20px;font-weight:600;margin:22px 0 10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:15px;box-shadow:0 1px 2px rgba(20,20,19,.04)}
.top{display:flex;justify-content:space-between;align-items:flex-start}
.sym{font-size:17px;font-weight:800}
.nm{color:var(--dim);font-size:11px}
.p{font-size:17px;font-weight:700;text-align:right}
.up{color:var(--green)}.down{color:var(--red)}
.chip{display:inline-block;font-size:10px;font-weight:700;padding:1px 8px;border-radius:7px;margin-top:5px}
.c-brk{background:#e9f5ee;color:#217a44}.c-dip{background:#f9ede8;color:var(--primary)}.c-avoid{background:#faeceb;color:var(--red)}.c-hold{background:#eaf3f0;color:#2f7d6b}
.rows{margin-top:10px;font-size:12px}
.row{display:flex;justify-content:space-between;padding:2px 0}
.row .k{color:var(--dim)}
.sig{margin-top:10px;background:var(--panel2);border-radius:8px;padding:9px 11px;font-size:12px}
.sig .t{font-weight:700;margin-bottom:3px}
.bt{margin-top:9px;font-size:11px;color:var(--dim)}
.act{margin-top:9px;font-size:11.5px;color:var(--txt);border-left:3px solid var(--primary);padding-left:8px}
footer{margin-top:26px;background:#181715;color:#a09d96;border-radius:12px;padding:20px;font-size:11px;line-height:1.7}
footer b{color:#e8e0d2}
</style></head><body>

<script>

  if(d<=0)return ' <span class="chip" style="background:#e9f5ee;color:#217a44;font-weight:800">рҹҡҖе·ІиҝҮи§ҰеҸ‘д»·</span>';

 return ' <span class="chip" style="background:#efe9de;color:#6c6a64">зҰ»д№°зӮ№+'+d2.toFixed(1)+'%</span>';}
function stAdv(r){var s=r.state;var t=s?({para:'рҹ”ҘжҠӣзү©зәҝ(20ж—Ҙ+'+s.ret20+'%гҖҒи¶…50MA '+s.ext+'%):10ж—Ҙжҡҙж¶Ё/жҡҙи·ҢжҰӮзҺҮеқҮГ—2.3вҖ”вҖ”жҢҒжңүиҖ…еҮҸд»“+ж”¶зҙ§жӯўжҚҹгҖҒеӢҝеҠ д»“;д№°е…Ҙи®ЎеҲ’жҡӮеҒң',hot:'рҹ”ҘзҹӯжңҹиҝҮзғӯ(5ж—Ҙ+'+s.ret5+'%):10ж—Ҙжҡҙи·ҢжҰӮзҺҮГ—2.2вҖ”вҖ”еҲ«иҝҪй«ҳ,зӯүеӣһиё©;жҢҒжңүиҖ…еҸҜе…Ҳе…‘зҺ°дёҖйғЁеҲҶ',brk:'вҡ пёҸз ҙдҪҚ(50MAдёӢгҖҒ20ж—Ҙ'+s.ret20+'%):и·ҢеҠҝе»¶з»ӯжҰӮзҺҮГ—1.38вҖ”вҖ”д№°е…ҘжҡӮеҒңгҖҒдёҚжҺҘйЈһеҲҖ;жҢҒжңүиҖ…еҸҚжҠҪеҚіеҮҸ',tight:'рҹӣЎпёҸзҙ§е№іеҸ°иҝ‘й«ҳ(20ж—ҘеҢәй—ҙ'+s.rng20+'%):10ж—Ҙжҡҙи·ҢжҰӮзҺҮвүҲ0вҖ”вҖ”еҹӢдјҸе®үе…Ё,еҲҶжү№е»әд»“зӯүзӘҒз ҙ',quiet:'рҹҳҙдҪҺжіўеҠЁе®үйқҷ:еӨ§жҰӮзҺҮе»¶з»ӯ,жҢүи®ЎеҲ’жү§иЎҢ'}[s.st]||''):'';
 var g=r.gap;

/* Composite entry score v1 вҖ” deterministic tier (buy/watch/avoid) from weighted factors.

function composite(r){
 var s=r.signal||{},bt=r.backtest||{},st=(r.state||{}).st,parts={},gates=[];
 var x=(r.strategy==='brk'?bt.brk:r.strategy==='brk_atr'?bt.brk_atr:r.strategy==='dip_re'?bt.dip_re:bt.dip)||{};
 if(r.strategy==='hold'&&r.hold_stats){var cg=r.hold_stats.cagr||0;parts.backtest={v:cg>=40?42:cg>=25?34:20,max:50,why:'й•ҝжҢҒCAGR '+cg+'%'};}
 else if(typeof x.expectancy_R==='number'){var E=x.expectancy_R;var v=E>=1?50:E>=0.5?30+(E-0.5)*40:E>=0?10+E*40:0;var w='жңҹжңӣ'+E+'R('+x.n+'з¬”)';if(x.n<5){v=Math.min(v,25);w+='В·ж ·жң¬е°Ҹе·ІеҺӢзј©'}parts.backtest={v:Math.round(v),max:50,why:w};}
 else parts.backtest={v:25,max:50,why:'ж— еӣһжөӢ(дёӯжҖ§)'};
 var s2=/Stage ?2|дёҠеҚҮ/.test(r.stage||''),s4=/Stage ?4|дёӢи·Ң/.test(r.stage||'');
 parts.position=s2?(r.pct_from_high>=-15?{v:30,max:30,why:'Stage2В·и·қй«ҳ'+r.pct_from_high+'%'}:r.pct_from_high>=-30?{v:18,max:30,why:'Stage2дҪҶеӣһж’Ө'+r.pct_from_high+'%'}:{v:9,max:30,why:'Stage2ж·ұеӣһж’Ө'}):s4?{v:0,max:30,why:'дёӢи·Ңйҳ¶ж®ө'}:{v:12,max:30,why:r.stage||'иҝҮжёЎ'};
 var SQ={tight:[20,'зҙ§е№іеҸ°'],quiet:[16,'дҪҺжіўеҠЁ'],neutral:[12,'еёёжҖҒ'],hot:[4,'иҝҮзғӯ'],brk:[2,'з ҙдҪҚ'],para:[0,'жҠӣзү©зәҝ']},sq=SQ[st]||[12,'зҠ¶жҖҒжңӘзҹҘ(дёӯжҖ§)'];
 parts.structure={v:sq[0],max:20,why:sq[1]};
 var Q=Math.round(parts.backtest.v+parts.position.v+parts.structure.v);
 var dv,dw,nearTrig=false;
 if(s.type==='breakout'&&s.trigger&&r.last){var d2=(s.trigger-r.last)/r.last*100;
  if(d2<=0){dv=60;dw='е·ІиҝҮи§ҰеҸ‘';nearTrig=true}else if(d2<=3){dv=42;dw='и·қи§ҰеҸ‘+'+d2.toFixed(1)+'%В·дёҙз•Ң';nearTrig=true}
  else if(d2<=12){dv=18;dw='и·қи§ҰеҸ‘+'+d2.toFixed(1)+'%В·жҢӮеҚ•зӯү'}else{dv=6;dw='и·қи§ҰеҸ‘+'+d2.toFixed(1)+'%В·зӯ‘еә•дёӯ'}}
 else{var z=s.buy_zones&&s.buy_zones[0];
  if(z&&r.last){var d=(r.last-z)/z*100;
   if(d<=-8){dv=12;dw='ж·ұз ҙд№°еҢә'+Math.round(d)+'%'}else if(d<=1){dv=60;dw='е·Іиҝӣд№°еҢә'}
   else if(d<=6){dv=Math.round(60-7*(d-1));dw='иҝ‘д№°еҢә+'+d.toFixed(1)+'%'}else{dv=Math.max(0,Math.round(24-2.4*(d-6)));dw='и·қд№°еҢә+'+d.toFixed(1)+'%'}}
  else{dv=6;dw='ж— д№°зӮ№е®ҡд№ү'}}
 parts.dist={v:dv,max:60,why:dw};
 var STm={tight:[25,'зҙ§е№іеҸ°В·еҹӢдјҸе®үе…Ё'],quiet:[20,'дҪҺжіўеҠЁ'],neutral:[15,'еёёжҖҒ'],brk:[4,'дёҚжҺҘйЈһеҲҖ'],hot:[4,'иҝҮзғӯ'],para:[0,'жҠӣзү©зәҝ']},stv=STm[st]||[15,'зҠ¶жҖҒжңӘзҹҘ(дёӯжҖ§)'];
 parts.tstate={v:stv[0],max:25,why:stv[1]};
 var g=r.gap,gv=10,gw='еҪ“ж—ҘжіўеҠЁе°Ҹ(дёӯжҖ§)';
 if(g&&Math.abs(r.chg)>=2){if(r.chg>=2){gv=g.cont>=55?15:g.cont<=45?3:8;gw='й«ҳејҖе»¶з»ӯзҺҮ'+g.cont+'%'}
  else{gv=(g.bounce!=null&&g.bounce>=55)?13:(g.bounce!=null&&g.bounce<=45)?4:8;gw='дёӢи·іеҸҚеј№зҺҮ'+(g.bounce==null?'ж ·жң¬дёҚи¶і':g.bounce+'%')}}
 parts.gap={v:gv,max:15,why:gw};
 var T=Math.round(parts.dist.v+parts.tstate.v+parts.gap.v);
 var C=Math.round(0.55*Q+0.45*T);
 var hard=false,cap=false,stp=s.stop||s.trend_stop;
 if(s.type!=='breakout'&&stp&&r.last<=stp){gates.push('вӣ”з ҙдҪҚВ·дҝЎеҸ·еӨұж•Ҳ');hard=true}
 var mk=PAYLOAD.market;if(mk&&!mk.above){gates.push('еӨ§зӣҳејҖе…ізәўВ·зҰҒиҝҪж¶Ё');cap=true}
 if((st==='para'||st==='hot')&&nearTrig){gates.push('иҝҮзғӯеӢҝиҝҪзӘҒз ҙ');cap=true}

 if(hard){tier='avoid';txt='рҹ”ҙ '+gates[gates.length-1]}

const CPLAB={backtest:'еӣһжөӢжңҹжңӣ',position:'йҳ¶ж®өдҪҚзҪ®',structure:'жіўеҠЁз»“жһ„',dist:'и·қд№°зӮ№/и§ҰеҸ‘',tstate:'зҠ¶жҖҒзҒҜ',gap:'и·із©әз»ҹи®Ў'};

  return '<div style="display:flex;justify-content:space-between;padding:2px 0"><span>'+CPLAB[k]+' <span style="color:#6c6a64">'+p.why+'</span></span><b style="color:'+c2+'">'+p.v+'/'+p.max+'</b></div>'}).join('');
 return '<div style="margin-top:9px;display:flex;justify-content:space-between;align-items:center;font-size:12.5px"><b>з»јеҗҲиҜ„еҲҶ '+cp.C+'/100</b><span style="font-weight:800;font-size:11px;padding:2px 9px;border-radius:8px;background:'+bg+';color:'+col+'">'+cp.txt+'</span></div>'

}
const $=id=>document.getElementById(id);

const money=n=>'$'+(+n).toLocaleString(undefined,{maximumFractionDigits:2});
function bt(r){if(r.strategy==='hold'&&r.hold_stats){var h=r.hold_stats;return 'д№°жҢҒ: е…ЁзЁӢ+'+h.buy_hold_pct+'% В· CAGR '+h.cagr+'% В· жңҖеӨ§еӣһж’Ө'+h.max_dd+'%';}var b=r.backtest||{};var s=r.strategy;var x=(s==='brk'?b.brk:s==='brk_atr'?b.brk_atr:s==='dip_re'?b.dip_re:b.dip)||{};if(!x.n)return '';return 'еӣһжөӢ: '+x.n+'з¬” В· иғң'+x.win_rate+'% В· жңҹжңӣ'+x.expectancy_R+'R';}

<!-- еҲ·ж–°жҢүй’®+иҝӣеәҰжқЎ(д»…з»Ҹ serve.py жң¬ең°жңҚеҠЎеҷЁ http жү“ејҖж—¶еҸҜз”Ё;file:// еҸҢеҮ»ж—¶еҸҳзҒ°жҸҗзӨә) -->
<div id="rfBar" style="position:fixed;top:12px;right:16px;z-index:9999;font-family:var(--sans,system-ui,sans-serif)">
  <button id="rfBtn" style="background:var(--primary,#cc785c);color:#fff;border:none;padding:8px 15px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(20,20,19,.18)">рҹ”„ еҲ·ж–°ж•°жҚ®</button>
  <div id="rfProg" style="display:none;margin-top:7px;width:230px;background:var(--panel,#fffdf7);border:1px solid var(--border,#e6dfd8);border-radius:10px;padding:9px 11px;box-shadow:0 3px 12px rgba(20,20,19,.18)">
    <div id="rfStage" style="font-size:11px;color:var(--dim,#6c6a64);margin-bottom:6px">еҮҶеӨҮвҖҰ</div>
    <div style="height:8px;background:var(--chip,#efe9de);border-radius:5px;overflow:hidden"><div id="rfFill" style="height:100%;width:0%;background:var(--primary,#cc785c);transition:width .4s ease"></div></div>
  </div>
</div>
<script>
(function(){
  var http=location.protocol==='http:'||location.protocol==='https:';
  var btn=document.getElementById('rfBtn'),prog=document.getElementById('rfProg'),stg=document.getElementById('rfStage'),fill=document.getElementById('rfFill');
  if(!btn)return;
  if(!http){ btn.textContent='рҹ”„ еҲ·ж–°(йңҖжңҚеҠЎеҷЁ)';btn.style.background='#9a9a9a';
    btn.onclick=function(){alert('еҲ·ж–°жҢүй’®йңҖйҖҡиҝҮжң¬ең°жңҚеҠЎеҷЁжү“ејҖжүҚиғҪз”Ё:\nе‘Ҫд»ӨиЎҢи·‘  python serve.py  (дјҡиө·жңҚеҠЎеҷЁе№¶жү“ејҖжөҸи§ҲеҷЁ),еҲ«зӣҙжҺҘеҸҢеҮ» dashboard.htmlгҖӮ');};
    return; }
  var poll=null,creep=null,shown=0,ceil=8;
  function paint(){ fill.style.width=shown.toFixed(1)+'%'; }
  function setCeil(p){ ceil=(p>=100?100:p>=90?97:p>=12?88:8); if(shown<p)shown=p; }
  btn.onclick=async function(){
    if(btn.disabled)return; btn.disabled=true;btn.style.opacity='.6';prog.style.display='block';stg.style.color='var(--dim,#6c6a64)';
    shown=3;ceil=8;paint();stg.textContent='еҗҜеҠЁвҖҰ';
    creep=setInterval(function(){ if(shown<ceil){shown=Math.min(ceil,shown+Math.max(0.3,(ceil-shown)*0.04));paint();} },170);
    try{ var j=await (await fetch('/refresh',{method:'POST'})).json(); if(j.busy)stg.textContent='е·ІжңүеҲ·ж–°еңЁи·‘вҖҰ'; }
    catch(e){ clearInterval(creep);stg.style.color='#c64545';stg.textContent='вқҢ иҝһдёҚдёҠжңҚеҠЎеҷЁ';btn.disabled=false;btn.style.opacity='1';return; }
    poll=setInterval(async function(){
      try{ var s=await (await fetch('/status')).json();
        if(s.stage)stg.textContent=s.stage; setCeil(s.pct);
        if(s.error){clearInterval(poll);clearInterval(creep);stg.style.color='#c64545';stg.textContent='вқҢ '+s.error;btn.disabled=false;btn.style.opacity='1';}
        else if(s.done){clearInterval(poll);clearInterval(creep);shown=100;paint();stg.textContent='вң… е®ҢжҲҗ,йҮҚиҪҪвҖҰ';setTimeout(function(){location.reload();},700);}
      }catch(e){}
    },800);
  };
})();
</script>
