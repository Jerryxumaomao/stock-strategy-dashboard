<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Strategy Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf9f5;--panel:#fffdf7;--panel2:#f5f0e8;--border:#e6dfd8;--txt:#141413;--dim:#6c6a64;
--primary:#cc785c;--green:#2f9e5b;--red:#c64545;--chip:#efe9de;
--serif:"Cormorant Garamond",Georgia,"Songti SC","SimSun",serif;--sans:"Inter","Microsoft YaHei",system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:#3d3d3a;font-family:var(--sans);padding:20px;line-height:1.5}
h1{font-family:var(--serif);font-size:28px;font-weight:600;color:var(--txt)}
.sub{color:var(--dim);font-size:12px;margin:4px 0 14px}
.counts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.count{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600}
.sec{font-family:var(--serif);font-size:20px;font-weight:600;margin:22px 0 10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:15px;box-shadow:0 1px 2px rgba(20,20,19,.04)}
.top{display:flex;justify-content:space-between;align-items:flex-start}
.sym{font-size:17px;font-weight:800}
.nm{color:var(--dim);font-size:11px}
.p{font-size:17px;font-weight:700;text-align:right}
.up{color:var(--green)}.down{color:var(--red)}
.chip{display:inline-block;font-size:10px;font-weight:700;padding:1px 8px;border-radius:7px;margin-top:5px}
.c-brk{background:#e9f5ee;color:#217a44}.c-dip{background:#f9ede8;color:var(--primary)}.c-avoid{background:#faeceb;color:var(--red)}.c-hold{background:#eaf3f0;color:#2f7d6b}
.rows{margin-top:10px;font-size:12px}
.row{display:flex;justify-content:space-between;padding:2px 0}
.row .k{color:var(--dim)}
.sig{margin-top:10px;background:var(--panel2);border-radius:8px;padding:9px 11px;font-size:12px}
.sig .t{font-weight:700;margin-bottom:3px}
.bt{margin-top:9px;font-size:11px;color:var(--dim)}
.act{margin-top:9px;font-size:11.5px;color:var(--txt);border-left:3px solid var(--primary);padding-left:8px}
footer{margin-top:26px;background:#181715;color:#a09d96;border-radius:12px;padding:20px;font-size:11px;line-height:1.7}
footer b{color:#e8e0d2}
</style></head><body>
<h1>рҹ“Ҡ <span id="ttl"></span></h1>
<div class="sub" id="sub"></div>
<div class="counts" id="counts"></div>
<div id="body"></div>
<footer id="foot"></footer>
<script>
const PAYLOAD=/*__DATA__*/{};
const SLAB={brk:['рҹ“Ҳ е®ңзӘҒз ҙ','c-brk'],brk_atr:['рҹ“Ҳ зӘҒз ҙВ·е®ҪжӯўжҚҹ','c-brk'],hold:['рҹҸ”пёҸ й•ҝжҢҒ','c-hold'],dip:['рҹ“ү е®ңжҠ„еә•','c-dip'],dip_re:['рҹ“ү жҠ„еә•+еҶҚиҝӣ','c-dip'],avoid:['рҹҡ« еӣһйҒҝ','c-avoid']};
const STL={para:['рҹ”ҘжҠӣзү©зәҝ','#faeceb','#c64545'],hot:['рҹ”ҘиҝҮзғӯ','#faeceb','#c64545'],brk:['вҡ пёҸз ҙдҪҚ','#f8f1df','#b07d0a'],tight:['рҹӣЎпёҸзҙ§е№іеҸ°','#e9f5ee','#217a44'],quiet:['рҹҳҙе®үйқҷ','#efe9de','#6c6a64'],neutral:['В·еёёжҖҒ','#efe9de','#6c6a64']};
function stChip(r){var s=r.state;if(!s||!STL[s.st])return '';var x=STL[s.st];return ' <span class="chip" style="background:'+x[1]+';color:'+x[2]+'">'+x[0]+'</span>'}
function stAdv(r){var s=r.state;if(!s)return '';var t={para:'рҹ”ҘжҠӣзү©зәҝ(20ж—Ҙ+'+s.ret20+'%гҖҒи¶…50MA '+s.ext+'%):10ж—Ҙжҡҙж¶Ё/жҡҙи·ҢжҰӮзҺҮеқҮГ—2.3вҖ”вҖ”жҢҒжңүиҖ…еҮҸд»“+ж”¶зҙ§жӯўжҚҹгҖҒеӢҝеҠ д»“;д№°е…Ҙи®ЎеҲ’жҡӮеҒң',hot:'рҹ”ҘзҹӯжңҹиҝҮзғӯ(5ж—Ҙ+'+s.ret5+'%):10ж—Ҙжҡҙи·ҢжҰӮзҺҮГ—2.2вҖ”вҖ”еҲ«иҝҪй«ҳ,зӯүеӣһиё©;жҢҒжңүиҖ…еҸҜе…Ҳе…‘зҺ°дёҖйғЁеҲҶ',brk:'вҡ пёҸз ҙдҪҚ(50MAдёӢгҖҒ20ж—Ҙ'+s.ret20+'%):и·ҢеҠҝе»¶з»ӯжҰӮзҺҮГ—1.38вҖ”вҖ”д№°е…ҘжҡӮеҒңгҖҒдёҚжҺҘйЈһеҲҖ;жҢҒжңүиҖ…еҸҚжҠҪеҚіеҮҸ',tight:'рҹӣЎпёҸзҙ§е№іеҸ°иҝ‘й«ҳ(20ж—ҘеҢәй—ҙ'+s.rng20+'%):10ж—Ҙжҡҙи·ҢжҰӮзҺҮвүҲ0вҖ”вҖ”еҹӢдјҸе®үе…Ё,еҲҶжү№е»әд»“зӯүзӘҒз ҙ',quiet:'рҹҳҙдҪҺжіўеҠЁе®үйқҷ:еӨ§жҰӮзҺҮе»¶з»ӯ,жҢүи®ЎеҲ’жү§иЎҢ'}[s.st]||'';return t?'<div style="margin-top:6px;font-size:11px;color:#3d3d3a;border-top:1px dashed #e6dfd8;padding-top:5px">'+t+'</div>':''}
const $=id=>document.getElementById(id);
$('ttl').textContent=PAYLOAD.title||'Stock Strategy Dashboard';
$('sub').textContent='жӣҙж–° '+PAYLOAD.as_of+' В· ж•°жҚ®жәҗ '+PAYLOAD.source+' В· '+PAYLOAD.tickers.length+' еҸӘ В· еҶізӯ–иҫ…еҠ©йқһжҠ•иө„е»әи®®';
const money=n=>'$'+(+n).toLocaleString(undefined,{maximumFractionDigits:2});
function bt(r){if(r.strategy==='hold'&&r.hold_stats){var h=r.hold_stats;return 'д№°жҢҒ: е…ЁзЁӢ+'+h.buy_hold_pct+'% В· CAGR '+h.cagr+'% В· жңҖеӨ§еӣһж’Ө'+h.max_dd+'%';}var b=r.backtest||{};var s=r.strategy;var x=(s==='brk'?b.brk:s==='brk_atr'?b.brk_atr:s==='dip_re'?b.dip_re:b.dip)||{};if(!x.n)return '';return 'еӣһжөӢ: '+x.n+'з¬” В· иғң'+x.win_rate+'% В· жңҹжңӣ'+x.expectancy_R+'R';}
function posSize(entry,stop){var cap=PAYLOAD.capital||0,rp=PAYLOAD.risk_pct||1.5;if(!cap||!entry||!stop||stop>=entry)return '';var risk=cap*rp/100;var sh=Math.floor(risk/(entry-stop));if(sh<1)return '';var cost=Math.round(sh*entry);if(cost>cap*0.35){sh=Math.floor(cap*0.35/entry);cost=Math.round(sh*entry);}return '<div style="margin-top:5px;font-size:11px;color:#2f7d6b;font-weight:600">рҹ’° е»әи®®д»“дҪҚ '+sh+'иӮЎвүҲ$'+cost.toLocaleString()+' В· еҚ•з¬”йЈҺйҷ©$'+Math.round(risk)+'('+rp+'%)</div>';}
function sigHtml(r){var s=r.signal;if(!s||!s.type)return '';
 if(s.type==='breakout')return '<div class="sig"><div class="t" style="color:#217a44">рҹ“Ҳ зӘҒз ҙд№°е…Ҙ</div>зӘҒз ҙ &gt; '+money(s.trigger)+' В· жӯўжҚҹ '+money(s.stop)+'<br><span style="color:var(--dim)">'+s.status+'</span>'+posSize(s.trigger,s.stop)+'</div>';
 if(s.type==='hold')return '<div class="sig"><div class="t" style="color:#2f7d6b">рҹҸ”пёҸ й•ҝжҢҒВ·д№°дҫҝе®ң(жӯЈиӮЎВ·дёҚеҠ жқ жқҶ)</div>еӣһиё©д№°е…Ҙ '+s.buy_zones.map(money).join(' / ')+'<br>зӣ®ж Ү '+s.target.map(money).join(' / ')+' В· з ҙ '+money(s.trend_stop)+'(200ж—Ҙзәҝ)зҰ»еңә'+posSize(s.buy_zones[0],s.trend_stop)+'</div>';
 return '<div class="sig"><div class="t" style="color:var(--primary)">рҹ“ү еҲҶжү№д№°е…ҘеҢә</div>'+s.buy_zones.map(money).join(' / ')+' В· жӯўжҚҹ '+money(s.stop)+'<br><span style="color:var(--dim)">'+(s.note||'')+'</span>'+posSize(s.buy_zones[0],s.stop)+'</div>';}
function card(r){var sl=SLAB[r.strategy]||SLAB.avoid;var cc=r.chg>=0?'up':'down';
 return '<div class="card"><div class="top"><div><div class="sym">'+r.ticker+'</div><div class="nm">'+r.stage+' В· жіўеҠЁ'+r.vol+'%</div><div><span class="chip '+sl[1]+'">'+sl[0]+'</span>'+stChip(r)+'</div></div>'+
 '<div><div class="p">'+money(r.last)+'</div><div class="'+cc+'" style="font-size:12px;font-weight:600;text-align:right">'+(r.chg>=0?'в–І':'в–ј')+' '+r.chg+'%</div></div></div>'+
 '<div class="rows"><div class="row"><span class="k">и·қ52е‘Ёй«ҳ</span><span class="down">'+r.pct_from_high+'%</span></div>'+(r.bucket?'<div class="row"><span class="k">зұ»еҲ«</span><span>'+r.bucket+'</span></div>':'')+'</div>'+
 sigHtml(r)+stAdv(r)+(bt(r)?'<div class="bt">'+bt(r)+'</div>':'')+(r.action?'<div class="act">'+r.action+'</div>':'')+'</div>';}
const order=['brk','brk_atr','dip','dip_re','hold','avoid'];const secName={brk:'рҹ“Ҳ е®ңзӘҒз ҙ',brk_atr:'рҹ“Ҳ зӘҒз ҙВ·е®ҪжӯўжҚҹ',hold:'рҹҸ”пёҸ й•ҝжҢҒ(жӯЈиӮЎ)',dip:'рҹ“ү е®ңжҠ„еә•',dip_re:'рҹ“ү жҠ„еә•+еҶҚиҝӣ',avoid:'рҹҡ« еӣһйҒҝ'};
const byS={};PAYLOAD.tickers.forEach(r=>{(byS[r.strategy]=byS[r.strategy]||[]).push(r)});
$('counts').innerHTML=order.filter(s=>byS[s]).map(s=>'<div class="count">'+secName[s]+' '+byS[s].length+'</div>').join('');
(function(){var mk=PAYLOAD.market;if(mk){$('counts').insertAdjacentHTML('beforebegin','<div style="padding:9px 14px;border-radius:10px;margin-bottom:10px;font-weight:700;font-size:13px;background:'+(mk.above?'#e9f5ee;color:#217a44':'#faeceb;color:#c64545')+'">'+(mk.above?'рҹҹў еӨ§зӣҳејҖе…і:SPY $'+mk.spy+' еңЁ200ж—ҘзәҝдёҠ(+'+mk.pct+'%)вҖ”вҖ”е…Ғи®ёиҝҪж¶Ё/жӯЈеёёд»“дҪҚ':'рҹ”ҙ еӨ§зӣҳејҖе…і:SPY $'+mk.spy+' з ҙ200ж—Ҙзәҝ('+mk.pct+'%)вҖ”вҖ”зҰҒзӘҒз ҙиҝҪж¶ЁВ·д»“дҪҚеҮҸеҚҠ')+'</div>');}
 var cl=PAYLOAD.clusters;if(cl&&cl.length){$('counts').insertAdjacentHTML('afterend','<div style="font-size:11px;color:#6c6a64;margin-bottom:8px">вҡ пёҸ зӣёе…із°Ү(120ж—Ҙcorr&gt;0.7,еҗҢз°ҮвүҲеҗҢдёҖжіЁ,жҜҸз°Үйҷҗ1-2д»“):'+cl.map(c=>'['+c.join(' ')+']').join(' В· ')+'</div>');}})();
$('body').innerHTML=order.filter(s=>byS[s]).map(s=>'<div class="sec">'+secName[s]+'</div><div class="grid">'+byS[s].map(card).join('')+'</div>').join('');
/* market-wide movers radar (zero-cost local scan) */
(function(){var M=PAYLOAD.movers;if(!M)return;var watch=new Set(PAYLOAD.tickers.map(r=>r.ticker));
 function tbl(rows,title){if(!Array.isArray(rows)||!rows.length)return '';
  var tr=rows.map(r=>'<tr'+(r.volx>=3?' style="background:#f9ede8"':'')+'><td><b>'+r.s+'</b>'+(watch.has(r.s)?' <span style="font-size:9px;color:var(--primary)">иҮӘйҖү</span>':'')+'</td><td style="text-align:left;font-size:10.5px;color:#6c6a64">'+r.n+'</td><td>$'+r.px+'</td><td class="'+(r.chg>=0?'up':'down')+'">'+(r.chg>=0?'+':'')+r.chg+'%</td><td>'+(r.volx==null?'вҖ”':r.volx+'x')+'</td></tr>').join('');
  return '<div class="sec">'+title+'</div><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="color:#6c6a64"><th>зҘЁ</th><th style="text-align:left">еҗҚз§°</th><th>д»·</th><th>ж¶Ёи·Ң</th><th>йҮҸжҜ”</th></tr></thead><tbody>'+tr+'</tbody></table>';}
 var uoa='';
 if(M.uoa&&M.uoa.length){uoa='<div class="sec">рҹҗӢ жңҹжқғејӮеҠЁ UOA(жҲҗдәӨвүҘ3Г—OI)</div><table style="width:100%;border-collapse:collapse;font-size:12px"><tbody>'+M.uoa.map(u=>'<tr><td><b>'+u.t+'</b></td><td>'+(u.kind==='C'?'рҹ“ҲC':'рҹ“үP')+'</td><td>'+u.expiry+'</td><td>$'+u.k+'</td><td>'+u.vol.toLocaleString()+'/'+u.oi.toLocaleString()+'='+u.ratio+'x</td><td>$'+u.prem_m+'M</td></tr>').join('')+'</tbody></table><div style="font-size:11px;color:#6c6a64;margin-top:6px">UOAеҲҶдёҚеҮәд№°еҚ–ж–№еҗ‘(йңҖйҖҗз¬”ж•°жҚ®),иҝ‘еҲ°жңҹеӨ§еҚ•еҸҜиғҪжҳҜеҒҡеёӮеҜ№еҶІвҖ”вҖ”еҸӮиҖғж–№еҗ‘,еӢҝзӣҙжҺҘжҠ„еҚ•гҖӮ</div>';}
 document.getElementById('body').insertAdjacentHTML('beforeend','<div class="sec" style="margin-top:26px">рҹ“Ў е…ЁеёӮеңәејӮеҠЁйӣ·иҫҫ('+M.as_of+' В· е»¶иҝҹ~15еҲҶй’ҹ В· й«ҳдә®=йҮҸжҜ”вүҘ3)</div>'+tbl(M.movers.day_gainers,'рҹ“Ҳ ж¶Ёе№…жҰң')+tbl(M.movers.day_losers,'рҹ“ү и·Ңе№…жҰң')+tbl(M.movers.most_actives,'рҹ”Ҙ жҲҗдәӨжҙ»и·ғ')+uoa);})();
/* dark-pool SVR radar (FINRA free) */
(function(){var D=PAYLOAD.dark;if(!D||!D.rows||!D.rows.length)return;
 var tr=D.rows.map(r=>'<tr'+(Math.abs(r.z)>=1.5?' style="background:#f9ede8"':'')+'><td><b>'+r.t+'</b></td><td>'+r.svr+'%</td><td>'+r.avg10+'%</td><td class="'+(r.z>0?'up':'down')+'" style="font-weight:700">'+r.z+'</td><td>'+(r.z>=1.5?'рҹҹўд№°еҺӢи·іеҚҮ':r.z<=-1.5?'рҹ”ҙд№°еҺӢиҗҺзј©':'В·')+'</td></tr>').join('');
 document.getElementById('body').insertAdjacentHTML('beforeend','<div class="sec" style="margin-top:20px">рҹҢ‘ жҡ—зӣҳйӣ·иҫҫ(FINRAе®ҳж–№е…Қиҙ№ В· '+D.as_of+')</div><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="color:#6c6a64"><th>зҘЁ</th><th>SVR</th><th>10ж—ҘеқҮ</th><th>zеҲҶ</th><th>и§ЈиҜ»</th></tr></thead><tbody>'+tr+'</tbody></table><div style="font-size:11px;color:#6c6a64;margin-top:6px">DIXйҖ»иҫ‘(еҸҚзӣҙи§ү):й«ҳSVRвүҲеҒҡеёӮе•ҶеҒҡз©әеЎ«д№°еҚ•=д№°еҺӢ;зңӢzеҲҶи·іеҸҳйқһз»қеҜ№еҖјгҖӮT+1жҷҡй—ҙжӣҙж–°,д»…з»ҹи®Ўж— йҖҗз¬”гҖӮ</div>');})();
$('foot').innerHTML='<b>ж–№жі•:</b> жҜҸеҸӘзҘЁиҜҠж–ӯи¶ӢеҠҝйҳ¶ж®ө/жіўеҠЁзҺҮ,еӣһжөӢ"еӣһиё©жҠ„еә•"дёҺ"зӘҒз ҙиҝҪж¶Ё"дёӨзӯ–з•Ҙ,еҲҶй…ҚеҺҶеҸІжӯЈжңҹжңӣиҖ…(еҗҰеҲҷеӣһйҒҝе№¶з»ҷзұ»еҲ«еҜ№зӯ–);еҮәеңәи·ҹйҡҸSMA50и®©иөўе®¶и·‘гҖӮ<br><b>иҜҡе®һ:</b> и§„еҲҷд»ЈзҗҶйқһдёҘж јзј и®ә,ж ·жң¬еҶ…гҖҒеҺҶеҸІдёҚд»ЈиЎЁжңӘжқҘ,д»·еҖјеңЁйӘҢиҜҒжңҹжңӣдёҺзәӘеҫӢгҖӮйқһжҠ•иө„е»әи®®гҖӮ';
</script></body></html>
