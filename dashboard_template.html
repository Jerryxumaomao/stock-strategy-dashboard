<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Strategy Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf9f5;--panel:#fffdf7;--panel2:#f5f0e8;--border:#e6dfd8;--txt:#141413;--dim:#6c6a64;
--primary:#cc785c;--green:#2f9e5b;--red:#c64545;--chip:#efe9de;
--serif:"Cormorant Garamond",Georgia,"Songti SC","SimSun",serif;--sans:"Inter","Microsoft YaHei",system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:#3d3d3a;font-family:var(--sans);padding:20px;line-height:1.5}
h1{font-family:var(--serif);font-size:28px;font-weight:600;color:var(--txt)}
.sub{color:var(--dim);font-size:12px;margin:4px 0 14px}
.counts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.count{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600}
.sec{font-family:var(--serif);font-size:20px;font-weight:600;margin:22px 0 10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:15px;box-shadow:0 1px 2px rgba(20,20,19,.04)}
.top{display:flex;justify-content:space-between;align-items:flex-start}
.sym{font-size:17px;font-weight:800}
.nm{color:var(--dim);font-size:11px}
.p{font-size:17px;font-weight:700;text-align:right}
.up{color:var(--green)}.down{color:var(--red)}
.chip{display:inline-block;font-size:10px;font-weight:700;padding:1px 8px;border-radius:7px;margin-top:5px}
.c-brk{background:#e9f5ee;color:#217a44}.c-dip{background:#f9ede8;color:var(--primary)}.c-avoid{background:#faeceb;color:var(--red)}.c-hold{background:#eaf3f0;color:#2f7d6b}
.rows{margin-top:10px;font-size:12px}
.row{display:flex;justify-content:space-between;padding:2px 0}
.row .k{color:var(--dim)}
.sig{margin-top:10px;background:var(--panel2);border-radius:8px;padding:9px 11px;font-size:12px}
.sig .t{font-weight:700;margin-bottom:3px}
.bt{margin-top:9px;font-size:11px;color:var(--dim)}
.act{margin-top:9px;font-size:11.5px;color:var(--txt);border-left:3px solid var(--primary);padding-left:8px}
footer{margin-top:26px;background:#181715;color:#a09d96;border-radius:12px;padding:20px;font-size:11px;line-height:1.7}
footer b{color:#e8e0d2}
</style></head><body>
<h1>📊 <span id="ttl"></span></h1>
<div class="sub" id="sub"></div>
<div class="counts" id="counts"></div>
<div id="body"></div>
<footer id="foot"></footer>
<script>
const PAYLOAD=/*__DATA__*/{};
const SLAB={brk:['📈 宜突破','c-brk'],brk_atr:['📈 突破·宽止损','c-brk'],hold:['🏔️ 长持','c-hold'],dip:['📉 宜抄底','c-dip'],dip_re:['📉 抄底+再进','c-dip'],avoid:['🚫 回避','c-avoid']};
const STL={para:['🔥抛物线','#faeceb','#c64545'],hot:['🔥过热','#faeceb','#c64545'],brk:['⚠️破位','#f8f1df','#b07d0a'],tight:['🛡️紧平台','#e9f5ee','#217a44'],quiet:['😴安静','#efe9de','#6c6a64'],neutral:['·常态','#efe9de','#6c6a64']};
function stChip(r){var s=r.state;if(!s||!STL[s.st])return '';var x=STL[s.st];return ' <span class="chip" style="background:'+x[1]+';color:'+x[2]+'">'+x[0]+'</span>'}
function distChip(r){var s=r.signal||{};
 // Breakout FIRST: pre-trigger the price sits below the ATR stop by design (you haven't
 // entered yet), so the stop-breach test must NOT run here — it only applies to a dip
 // whose support has failed. Ordering these wrong flags every un-triggered breakout as broken.
 if(s.type==='breakout'&&s.trigger){var d=(s.trigger-r.last)/r.last*100;
  if(d<=0)return ' <span class="chip" style="background:#e9f5ee;color:#217a44;font-weight:800">🚀已过触发价</span>';
  if(d<=3)return ' <span class="chip" style="background:#e9f5ee;color:#217a44">🟢距触发+'+d.toFixed(1)+'%</span>';
  return ' <span class="chip" style="background:#efe9de;color:#6c6a64">距触发+'+d.toFixed(1)+'%·勿追</span>';}
 var z=s.buy_zones&&s.buy_zones[0];if(!z)return '';
 var st=s.stop||s.trend_stop;
 if(st&&r.last<=st)return ' <span class="chip" style="background:#faeceb;color:#c64545">⛔破位·信号失效</span>';
 var d2=(r.last-z)/z*100;
 if(d2<=1)return ' <span class="chip" style="background:#e9f5ee;color:#217a44;font-weight:800">🎯已到买点</span>';
 if(d2<=6)return ' <span class="chip" style="background:#e9f5ee;color:#217a44">🟢近买点+'+d2.toFixed(1)+'%</span>';
 return ' <span class="chip" style="background:#efe9de;color:#6c6a64">离买点+'+d2.toFixed(1)+'%</span>';}
function stAdv(r){var s=r.state;var t=s?({para:'🔥抛物线(20日+'+s.ret20+'%、超50MA '+s.ext+'%):10日暴涨/暴跌概率均×2.3——持有者减仓+收紧止损、勿加仓;买入计划暂停',hot:'🔥短期过热(5日+'+s.ret5+'%):10日暴跌概率×2.2——别追高,等回踩;持有者可先兑现一部分',brk:'⚠️破位(50MA下、20日'+s.ret20+'%):跌势延续概率×1.38——买入暂停、不接飞刀;持有者反抽即减',tight:'🛡️紧平台近高(20日区间'+s.rng20+'%):10日暴跌概率≈0——埋伏安全,分批建仓等突破',quiet:'😴低波动安静:大概率延续,按计划执行'}[s.st]||''):'';
 var g=r.gap;
 if(g&&g.cont!=null&&Math.abs(r.chg)>=2){var gt=r.chg>=2?(g.cont<=45?'🔴 今日大涨+'+r.chg+'%别追:该票≥2%跳空延续率仅'+g.cont+'%(n='+g.n_up+')、追入开→收均值'+g.oc_up+'%,fade票的高开=减仓窗口':g.cont>=55?'🟢 今日+'+r.chg+'%可顺势:跳空延续率'+g.cont+'%(n='+g.n_up+'),止损设开盘价下方':'🟡 今日+'+r.chg+'%:跳空无明显倾向('+g.cont+'%),按原计划'):(g.bounce!=null&&g.bounce>=55?'🟢 今日'+r.chg+'%:历史下跳反弹率'+g.bounce+'%,企稳后可按买入区接':'🔴 今日'+r.chg+'%:下跳反弹率'+(g.bounce==null?'样本不足':g.bounce+'%')+',不接飞刀');t=(t?t+'<br>':'')+gt;}
 return t?'<div style="margin-top:6px;font-size:11px;color:#3d3d3a;border-top:1px dashed #e6dfd8;padding-top:5px">'+t+'</div>':''}
/* Composite entry score v1 — deterministic tier (buy/watch/avoid) from weighted factors.
   Adapted from the full spec (gates veto first; quality "what to buy" x timing "when";
   C = 0.55*Q + 0.45*T). Factors renormalized to what THIS payload carries. Missing data
   always scores NEUTRAL with an honest label — never fabricated, never punished. */
function composite(r){
 var s=r.signal||{},bt=r.backtest||{},st=(r.state||{}).st,parts={},gates=[];
 var x=(r.strategy==='brk'?bt.brk:r.strategy==='brk_atr'?bt.brk_atr:r.strategy==='dip_re'?bt.dip_re:bt.dip)||{};
 if(r.strategy==='hold'&&r.hold_stats){var cg=r.hold_stats.cagr||0;parts.backtest={v:cg>=40?42:cg>=25?34:20,max:50,why:'长持CAGR '+cg+'%'};}
 else if(typeof x.expectancy_R==='number'){var E=x.expectancy_R;var v=E>=1?50:E>=0.5?30+(E-0.5)*40:E>=0?10+E*40:0;var w='期望'+E+'R('+x.n+'笔)';if(x.n<5){v=Math.min(v,25);w+='·样本小已压缩'}parts.backtest={v:Math.round(v),max:50,why:w};}
 else parts.backtest={v:25,max:50,why:'无回测(中性)'};
 var s2=/Stage ?2|上升/.test(r.stage||''),s4=/Stage ?4|下跌/.test(r.stage||'');
 parts.position=s2?(r.pct_from_high>=-15?{v:30,max:30,why:'Stage2·距高'+r.pct_from_high+'%'}:r.pct_from_high>=-30?{v:18,max:30,why:'Stage2但回撤'+r.pct_from_high+'%'}:{v:9,max:30,why:'Stage2深回撤'}):s4?{v:0,max:30,why:'下跌阶段'}:{v:12,max:30,why:r.stage||'过渡'};
 var SQ={tight:[20,'紧平台'],quiet:[16,'低波动'],neutral:[12,'常态'],hot:[4,'过热'],brk:[2,'破位'],para:[0,'抛物线']},sq=SQ[st]||[12,'状态未知(中性)'];
 parts.structure={v:sq[0],max:20,why:sq[1]};
 var Q=Math.round(parts.backtest.v+parts.position.v+parts.structure.v);
 var dv,dw,nearTrig=false;
 if(s.type==='breakout'&&s.trigger&&r.last){var d2=(s.trigger-r.last)/r.last*100;
  if(d2<=0){dv=60;dw='已过触发';nearTrig=true}else if(d2<=3){dv=42;dw='距触发+'+d2.toFixed(1)+'%·临界';nearTrig=true}
  else if(d2<=12){dv=18;dw='距触发+'+d2.toFixed(1)+'%·挂单等'}else{dv=6;dw='距触发+'+d2.toFixed(1)+'%·筑底中'}}
 else{var z=s.buy_zones&&s.buy_zones[0];
  if(z&&r.last){var d=(r.last-z)/z*100;
   if(d<=-8){dv=12;dw='深破买区'+Math.round(d)+'%'}else if(d<=1){dv=60;dw='已进买区'}
   else if(d<=6){dv=Math.round(60-7*(d-1));dw='近买区+'+d.toFixed(1)+'%'}else{dv=Math.max(0,Math.round(24-2.4*(d-6)));dw='距买区+'+d.toFixed(1)+'%'}}
  else{dv=6;dw='无买点定义'}}
 parts.dist={v:dv,max:60,why:dw};
 var STm={tight:[25,'紧平台·埋伏安全'],quiet:[20,'低波动'],neutral:[15,'常态'],brk:[4,'不接飞刀'],hot:[4,'过热'],para:[0,'抛物线']},stv=STm[st]||[15,'状态未知(中性)'];
 parts.tstate={v:stv[0],max:25,why:stv[1]};
 var g=r.gap,gv=10,gw='当日波动小(中性)';
 if(g&&Math.abs(r.chg)>=2){if(r.chg>=2){gv=g.cont>=55?15:g.cont<=45?3:8;gw='高开延续率'+g.cont+'%'}
  else{gv=(g.bounce!=null&&g.bounce>=55)?13:(g.bounce!=null&&g.bounce<=45)?4:8;gw='下跳反弹率'+(g.bounce==null?'样本不足':g.bounce+'%')}}
 parts.gap={v:gv,max:15,why:gw};
 var T=Math.round(parts.dist.v+parts.tstate.v+parts.gap.v);
 var C=Math.round(0.55*Q+0.45*T);
 var hard=false,cap=false,stp=s.stop||s.trend_stop;
 if(s.type!=='breakout'&&stp&&r.last<=stp){gates.push('⛔破位·信号失效');hard=true}
 var mk=PAYLOAD.market;if(mk&&!mk.above){gates.push('大盘开关红·禁追涨');cap=true}
 if((st==='para'||st==='hot')&&nearTrig){gates.push('过热勿追突破');cap=true}
 var er=(PAYLOAD.earnings||[]).find(e=>e.t===r.ticker);if(er&&er.days<=1){gates.push('财报在即·事件冻结');cap=true}
 if(r.strategy==='avoid'){gates.push('回测判回避');hard=true}
 var tier,txt;
 if(hard){tier='avoid';txt='🔴 '+gates[gates.length-1]}
 else{tier=(C>=70&&Q>=60&&T>=55)?'buy':C>=45?'watch':'avoid';
  if(tier==='buy'&&cap){tier='watch';txt='🟡 观察·'+gates[0]}
  else if(tier==='watch'&&Q>=70&&T<40)txt='🟡 观察·好票等回踩';
  else if(tier==='watch'&&T>=70&&Q<45)txt='🟡 观察·到价勿接';
  else txt={buy:'🟢 买入',watch:'🟡 观察',avoid:'🔴 回避'}[tier];}
 return {Q:Q,T:T,C:C,tier:tier,txt:txt,parts:parts,gates:gates};
}
const CPLAB={backtest:'回测期望',position:'阶段位置',structure:'波动结构',dist:'距买点/触发',tstate:'状态灯',gap:'跳空统计'};
function compoBlock(r){var cp=composite(r);var col=cp.tier==='buy'?'#217a44':cp.tier==='watch'?'#b07d0a':'#c64545';
 var bg=cp.tier==='buy'?'#e9f5ee':cp.tier==='watch'?'#f8f1df':'#faeceb';
 var rows=['backtest','position','structure','dist','tstate','gap'].map(function(k){var p=cp.parts[k];var pc=p.v/p.max;var c2=pc>=0.7?'#217a44':pc>=0.4?'#b07d0a':'#c64545';
  return '<div style="display:flex;justify-content:space-between;padding:2px 0"><span>'+CPLAB[k]+' <span style="color:#6c6a64">'+p.why+'</span></span><b style="color:'+c2+'">'+p.v+'/'+p.max+'</b></div>'}).join('');
 return '<div style="margin-top:9px;display:flex;justify-content:space-between;align-items:center;font-size:12.5px"><b>综合评分 '+cp.C+'/100</b><span style="font-weight:800;font-size:11px;padding:2px 9px;border-radius:8px;background:'+bg+';color:'+col+'">'+cp.txt+'</span></div>'
  +'<details style="margin-top:3px;font-size:11px"><summary style="cursor:pointer;color:#6c6a64">评分拆解:质量'+cp.Q+' × 时机'+cp.T+(cp.gates.length?' · 门槛'+cp.gates.length+'项':'')+'</summary>'
  +'<div style="margin-top:4px"><b style="font-size:10.5px">质量(值不值得买)</b>'+rows+'</div>'
  +(cp.gates.length?'<div style="margin-top:4px;color:#b07d0a">门槛: '+cp.gates.join(' · ')+'</div>':'')
  +'<div style="margin-top:4px;color:#6c6a64">C=0.55×质量+0.45×时机;缺数据给中性分并如实标注</div></details>';
}
const $=id=>document.getElementById(id);
$('ttl').textContent=PAYLOAD.title||'Stock Strategy Dashboard';
$('sub').textContent='更新 '+PAYLOAD.as_of+' · 数据源 '+PAYLOAD.source+' · '+PAYLOAD.tickers.length+' 只 · 决策辅助非投资建议';
const money=n=>'$'+(+n).toLocaleString(undefined,{maximumFractionDigits:2});
function bt(r){if(r.strategy==='hold'&&r.hold_stats){var h=r.hold_stats;return '买持: 全程+'+h.buy_hold_pct+'% · CAGR '+h.cagr+'% · 最大回撤'+h.max_dd+'%';}var b=r.backtest||{};var s=r.strategy;var x=(s==='brk'?b.brk:s==='brk_atr'?b.brk_atr:s==='dip_re'?b.dip_re:b.dip)||{};if(!x.n)return '';return '回测: '+x.n+'笔 · 胜'+x.win_rate+'% · 期望'+x.expectancy_R+'R';}
function posSize(entry,stop){var cap=PAYLOAD.capital||0,rp=PAYLOAD.risk_pct||1.5;if(!cap||!entry||!stop||stop>=entry)return '';var risk=cap*rp/100;var sh=Math.floor(risk/(entry-stop));if(sh<1)return '';var cost=Math.round(sh*entry);if(cost>cap*0.35){sh=Math.floor(cap*0.35/entry);cost=Math.round(sh*entry);}return '<div style="margin-top:5px;font-size:11px;color:#2f7d6b;font-weight:600">💰 建议仓位 '+sh+'股≈$'+cost.toLocaleString()+' · 单笔风险$'+Math.round(risk)+'('+rp+'%)</div>';}
function sigHtml(r){var s=r.signal;if(!s||!s.type)return '';
 if(s.type==='breakout')return '<div class="sig"><div class="t" style="color:#217a44">📈 突破买入</div>突破 &gt; '+money(s.trigger)+' · 止损 '+money(s.stop)+'<br><span style="color:var(--dim)">'+s.status+'</span>'+posSize(s.trigger,s.stop)+'</div>';
 if(s.type==='hold')return '<div class="sig"><div class="t" style="color:#2f7d6b">🏔️ 长持·买便宜(正股·不加杠杆)</div>回踩买入 '+s.buy_zones.map(money).join(' / ')+'<br>目标 '+s.target.map(money).join(' / ')+' · 破 '+money(s.trend_stop)+'(200日线)离场'+posSize(s.buy_zones[0],s.trend_stop)+'</div>';
 return '<div class="sig"><div class="t" style="color:var(--primary)">📉 分批买入区</div>'+s.buy_zones.map(money).join(' / ')+' · 止损 '+money(s.stop)+'<br><span style="color:var(--dim)">'+(s.note||'')+'</span>'+posSize(s.buy_zones[0],s.stop)+'</div>';}
function ashareBlock(r){var a=r.ashare;if(!a)return '';
 var parts=[];
 if(a.board)parts.push('<span style="color:#6c6a64">'+a.board.board+' ±'+a.board.limit_pct+'%</span>');
 if(a.limit&&a.limit.state!=='normal'){var lc=a.limit.state.indexOf('涨停')>=0?'#c64545':'#217a44';
   parts.push('<b style="color:'+lc+'">'+a.limit.state+' '+a.limit.chg_pct+'%</b>'+(a.limit.tradable_note?' <span style="color:#c64545;font-size:10px">('+a.limit.tradable_note+')</span>':''));}
 if(a.reversal){var rc=a.reversal.reversal_score>=60?'#217a44':a.reversal.reversal_score<=30?'#c64545':'#6c6a64';
   parts.push('反转分 <b style="color:'+rc+'">'+a.reversal.reversal_score+'</b> <span style="color:#6c6a64">('+a.reversal.tag+',过去'+a.reversal.lookback+'日'+a.reversal.past_ret_pct+'%)</span>');}
 if(a.turnover)parts.push('换手 '+a.turnover.turnover_now_pct+'% <span style="color:#6c6a64">分位'+a.turnover.turnover_percentile+'·'+a.turnover.tag+'</span>');
 if(a.chan&&a.chan.mode==='chan'){var cm={buy1:['#217a44','一买'],buy2:['#217a44','二买'],buy3:['#217a44','三买'],neutral:['#6c6a64','中枢'],'break':['#b07d0a','破位'],sell:['#c64545','卖点']};var cc=cm[a.chan.cls]||['#6c6a64','·'];
   parts.push('缠论 <b style="color:'+cc[0]+'">'+cc[1]+'</b> <span style="color:#6c6a64">'+a.chan.state+'</span>'+(a.chan.signal?'<br><span style="color:'+cc[0]+';font-size:10.5px">↳ '+a.chan.signal+'</span>':''));}
 else if(a.chan&&a.chan.state)parts.push('<span style="color:#6c6a64">缠论: '+a.chan.state+'</span>');
 var f=a.friction;if(f&&(f.sealed_up_days||f.sealed_dn_days||f.brk_skipped_sealed_up||f.limit_trapped_exits))
   parts.push('<span style="color:#b07d0a">⚠️涨跌停摩擦 封涨停'+f.sealed_up_days+'天/封跌停'+f.sealed_dn_days+'天'+(f.brk_skipped_sealed_up?'·买不进跳过'+f.brk_skipped_sealed_up+'次':'')+(f.limit_trapped_exits?'·跌停困住'+f.limit_trapped_exits+'次':'')+'</span>');
 var db=a.daban;if(db&&db.state&&db.state!=='无'&&db.state!=='数据不足'){var dc=db.cls==='sell'?'#c64545':db.cls==='buy'?'#c64545':'#b07d0a';
   parts.push('<span style="color:'+dc+';font-weight:700">🎯打板 '+db.state+'</span>'+(db.signal?'<br><span style="color:#c64545;font-size:10px">'+db.signal+'</span>':''));}
 return '<div style="margin-top:8px;padding:7px 9px;background:rgba(204,120,92,.06);border-radius:8px;font-size:11px;line-height:1.7"><b style="color:var(--primary)">🇨🇳 A股因子</b><span style="color:#6c6a64;font-size:9.5px"> · 回测已含T+1+涨跌停</span><br>'+parts.join('<br>')+'</div>';
}
function card(r){var sl=SLAB[r.strategy]||SLAB.avoid;var cc=r.chg>=0?'up':'down';
 return '<div class="card" data-sym="'+r.ticker+'"><div class="top"><div><div class="sym">'+r.ticker+'</div><div class="nm">'+r.stage+' · 波动'+r.vol+'%</div><div><span class="chip '+sl[1]+'">'+sl[0]+'</span>'+stChip(r)+distChip(r)+'</div></div>'+

<!-- 刷新按钮+进度条(仅经 serve.py 本地服务器 http 打开时可用;file:// 双击时变灰提示) -->
<div id="rfBar" style="position:fixed;top:12px;right:16px;z-index:9999;font-family:var(--sans,system-ui,sans-serif)">
  <button id="rfBtn" style="background:var(--primary,#cc785c);color:#fff;border:none;padding:8px 15px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(20,20,19,.18)">🔄 刷新数据</button>
  <div id="rfProg" style="display:none;margin-top:7px;width:230px;background:var(--panel,#fffdf7);border:1px solid var(--border,#e6dfd8);border-radius:10px;padding:9px 11px;box-shadow:0 3px 12px rgba(20,20,19,.18)">
    <div id="rfStage" style="font-size:11px;color:var(--dim,#6c6a64);margin-bottom:6px">准备…</div>
    <div style="height:8px;background:var(--chip,#efe9de);border-radius:5px;overflow:hidden"><div id="rfFill" style="height:100%;width:0%;background:var(--primary,#cc785c);transition:width .4s ease"></div></div>
  </div>
</div>
<script>
(function(){
  var http=location.protocol==='http:'||location.protocol==='https:';
  var btn=document.getElementById('rfBtn'),prog=document.getElementById('rfProg'),stg=document.getElementById('rfStage'),fill=document.getElementById('rfFill');
  if(!btn)return;
  if(!http){ btn.textContent='🔄 刷新(需服务器)';btn.style.background='#9a9a9a';
    btn.onclick=function(){alert('刷新按钮需通过本地服务器打开才能用:\n命令行跑  python serve.py  (会起服务器并打开浏览器),别直接双击 dashboard.html。');};
    return; }
  var poll=null,creep=null,shown=0,ceil=8;
  function paint(){ fill.style.width=shown.toFixed(1)+'%'; }
  function setCeil(p){ ceil=(p>=100?100:p>=90?97:p>=12?88:8); if(shown<p)shown=p; }
  btn.onclick=async function(){
    if(btn.disabled)return; btn.disabled=true;btn.style.opacity='.6';prog.style.display='block';stg.style.color='var(--dim,#6c6a64)';
    shown=3;ceil=8;paint();stg.textContent='启动…';
    creep=setInterval(function(){ if(shown<ceil){shown=Math.min(ceil,shown+Math.max(0.3,(ceil-shown)*0.04));paint();} },170);
    try{ var j=await (await fetch('/refresh',{method:'POST'})).json(); if(j.busy)stg.textContent='已有刷新在跑…'; }
    catch(e){ clearInterval(creep);stg.style.color='#c64545';stg.textContent='❌ 连不上服务器';btn.disabled=false;btn.style.opacity='1';return; }
    poll=setInterval(async function(){
      try{ var s=await (await fetch('/status')).json();
        if(s.stage)stg.textContent=s.stage; setCeil(s.pct);
        if(s.error){clearInterval(poll);clearInterval(creep);stg.style.color='#c64545';stg.textContent='❌ '+s.error;btn.disabled=false;btn.style.opacity='1';}
        else if(s.done){clearInterval(poll);clearInterval(creep);shown=100;paint();stg.textContent='✅ 完成,重载…';setTimeout(function(){location.reload();},700);}
      }catch(e){}
    },800);
  };
})();
</script>
